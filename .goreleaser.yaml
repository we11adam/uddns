project_name: uddns

before:
  hooks:
    - go mod tidy

builds:
  -
    id: default
    binary: uddns
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm_7
      - linux_arm64
      - freebsd_amd64
      - windows_amd64
      - windows_arm64
checksum:
  name_template: 'checksums.txt'

release:
  extra_files:
    - glob: ./install.sh

archives:
  - id: default
    builds:
      - default
    builds_info:
      mode: 0755
    format: zip
    format_overrides:
      - goos: linux
        format: tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
