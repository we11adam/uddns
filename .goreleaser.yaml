version: 2

project_name: uddns

before:
  hooks:
    - go mod tidy -diff
    - go mod verify

builds:
  -
    id: default
    binary: uddns
    flags: [-trimpath, -mod=readonly]
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm_7
      - linux_arm64
      - freebsd_amd64
      - windows_amd64
      - windows_arm64
checksum:
  name_template: 'checksums.txt'

sboms:
  - id: archives
    artifacts: archive

release:
  extra_files:
    - glob: ./install.sh

archives:
  - id: default
    ids:
      - default
    builds_info:
      mode: 0755
    # The installer deliberately accepts only one executable per archive.
    files:
      - none*
    formats: [zip]
    format_overrides:
      - goos: linux
        formats: [tar.gz]

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
